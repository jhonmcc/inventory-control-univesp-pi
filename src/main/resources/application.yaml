spring:
  application:
    name: inventory-control

  datasource:
    url: jdbc:postgresql://localhost:5432/stock-control
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
      ddl-auto: none
    show-sql: true

server:
  port: 8081
  servlet:
    context-path: /api